name: Build and Push to DigitalOcean Registry

on:
  push:
    branches:
      - main

env:
  REGISTRY: registry.digitalocean.com/${{ vars.DO_REGISTRY_NAME }}

jobs:
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            context: .
            dockerfile: services/auth-service/Dockerfile
          - service: driver-service
            context: .
            dockerfile: services/driver-service/Dockerfile
          - service: ride-service
            context: .
            dockerfile: services/ride-service/Dockerfile
          - service: matching-service
            context: .
            dockerfile: services/matching-service/Dockerfile
          - service: payment-service
            context: .
            dockerfile: services/payment-service/Dockerfile
          - service: notification-service
            context: .
            dockerfile: services/notification-service/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build Docker image
        run: |
          docker build \
            -f ${{ matrix.dockerfile }} \
            -t ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ matrix.service }}:latest \
            ${{ matrix.context }}

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ matrix.service }}:latest
