<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RideShare — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-600 to-purple-700 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-2xl shadow-lg mb-4">
        <svg class="w-8 h-8 text-indigo-600" fill="currentColor" viewBox="0 0 24 24">
          <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.85 7h10.29l1.08 3.11H5.77L6.85 7zM19 17H5v-5h14v5z"/>
          <circle cx="7.5" cy="14.5" r="1.5"/>
          <circle cx="16.5" cy="14.5" r="1.5"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white">RideShare</h1>
      <p class="text-indigo-200 mt-1">Your ride, anytime.</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <!-- Tabs -->
      <div class="flex bg-gray-100 rounded-xl p-1 mb-6">
        <button id="tab-login" onclick="showTab('login')"
          class="flex-1 py-2 text-sm font-semibold rounded-lg bg-white text-indigo-600 shadow transition">
          Login
        </button>
        <button id="tab-register" onclick="showTab('register')"
          class="flex-1 py-2 text-sm font-semibold rounded-lg text-gray-500 hover:text-gray-700 transition">
          Register
        </button>
      </div>

      <!-- Login Form -->
      <div id="form-login">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input id="login-email" type="email" placeholder="you@example.com"
              class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input id="login-password" type="password" placeholder="••••••••"
              class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          </div>
          <div id="login-error" class="hidden text-sm text-red-600 bg-red-50 rounded-lg px-3 py-2"></div>
          <button onclick="login()"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition text-sm">
            Sign In
          </button>
        </div>
      </div>

      <!-- Register Form -->
      <div id="form-register" class="hidden">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input id="reg-email" type="email" placeholder="you@example.com"
              class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
            <input id="reg-phone" type="text" placeholder="+1234567890"
              class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input id="reg-password" type="password" placeholder="••••••••"
              class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">I am a</label>
            <select id="reg-role"
              class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
              <option value="rider">Rider</option>
              <option value="driver">Driver</option>
            </select>
          </div>
          <div id="reg-msg" class="hidden text-sm rounded-lg px-3 py-2"></div>
          <button onclick="register()"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition text-sm">
            Create Account
          </button>
        </div>
      </div>
    </div>
  </div>

<script>
  const AUTH = 'http://localhost:3001';

  // Redirect if already logged in
  if (localStorage.getItem('token')) {
    window.location.href = 'dashboard.html';
  }

  function showTab(tab) {
    document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
    document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
    document.getElementById('tab-login').className =
      tab === 'login'
        ? 'flex-1 py-2 text-sm font-semibold rounded-lg bg-white text-indigo-600 shadow transition'
        : 'flex-1 py-2 text-sm font-semibold rounded-lg text-gray-500 hover:text-gray-700 transition';
    document.getElementById('tab-register').className =
      tab === 'register'
        ? 'flex-1 py-2 text-sm font-semibold rounded-lg bg-white text-indigo-600 shadow transition'
        : 'flex-1 py-2 text-sm font-semibold rounded-lg text-gray-500 hover:text-gray-700 transition';
  }

  async function login() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    errEl.classList.add('hidden');

    try {
      const res = await fetch(`${AUTH}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.message || 'Login failed.';
        errEl.classList.remove('hidden');
        return;
      }
      localStorage.setItem('token', data.accessToken);
      localStorage.setItem('refreshToken', data.refreshToken);
      window.location.href = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
    } catch (e) {
      errEl.textContent = 'Cannot connect to server. Is the auth service running?';
      errEl.classList.remove('hidden');
    }
  }

  async function register() {
    const msgEl = document.getElementById('reg-msg');
    msgEl.classList.add('hidden');

    try {
      const res = await fetch(`${AUTH}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('reg-email').value.trim(),
          phone: document.getElementById('reg-phone').value.trim(),
          password: document.getElementById('reg-password').value,
          role: document.getElementById('reg-role').value,
        }),
      });
      const data = await res.json();
      msgEl.classList.remove('hidden');
      if (res.ok) {
        msgEl.className = 'text-sm rounded-lg px-3 py-2 text-green-700 bg-green-50';
        msgEl.textContent = `Account created! You can now log in.`;
        showTab('login');
        document.getElementById('login-email').value = document.getElementById('reg-email').value;
      } else {
        msgEl.className = 'text-sm rounded-lg px-3 py-2 text-red-600 bg-red-50';
        msgEl.textContent = data.message || 'Registration failed.';
      }
    } catch (e) {
      msgEl.className = 'text-sm rounded-lg px-3 py-2 text-red-600 bg-red-50';
      msgEl.textContent = 'Cannot connect to server.';
      msgEl.classList.remove('hidden');
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const isLogin = !document.getElementById('form-login').classList.contains('hidden');
      isLogin ? login() : register();
    }
  });
</script>
</body>
</html>
